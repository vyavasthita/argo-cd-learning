apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-examples
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/diliplakshya/argocd-example-apps
    path: applications                               
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true